<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kim's Schedule - Trợ lý Lịch trình thông minh</title>
    <meta name="description" content="Quản lý lịch học, lịch làm và thu nhập cho du học sinh tại Đài Loan. Designed by mtdes23." />
    
    <!-- Font Preconnect & Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      /* Prevent FOUT (Flash of Unstyled Text) */
      body {
        font-family: 'Be Vietnam Pro', sans-serif;
        visibility: hidden;
      }
      .fonts-loaded body {
        visibility: visible;
      }
    </style>
    <script>
      // Font loading detection
      if ('fonts' in document) {
        Promise.all([
          document.fonts.load('1em Be Vietnam Pro'),
          document.fonts.load('1em Lexend')
        ]).then(() => {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(() => {
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
